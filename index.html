<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web - Home</title>
    <link rel="stylesheet" href="CSS/estilos-tema.css">
    <link rel="stylesheet" href="CSS/estilos-bb8.css">
    <!-- CORRECCIÓN: Enlace completo a Google Fonts -->
    <link href="https://googleapis.com/fonts.css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CONTENEDOR PARA LAS PARTÍCULAS */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* Detrás de todo */
            pointer-events: none; /* Permite hacer clic a través de ellas */
        }

        /* FONDO POR DEFECTO (MODO DÍA) */
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%) !important; 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* CUANDO SE ACTIVA EL MODO OSCURO */
        body.dark-mode {
            background: var(--bg-body) !important;
        }

        .navbar {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        .navbar .bb8-toggle {
            margin-left: 10px;
        }

        /* TARJETA CRISTAL (Z-INDEX SUPERIOR PARA QUE QUEDE ANTE LAS PARTÍCULAS) */
        .card {
            position: relative;
            z-index: 5;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px var(--shadow), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        body:not(.dark-mode) .card { 
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.12) 0%, rgba(255, 255, 255, 0.5) 100%);
            border: 1px solid rgba(14, 165, 233, 0.25);
        }

        body.dark-mode .card {
            background: rgba(30, 41, 59, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px var(--shadow);
        }

        body:not(.dark-mode) .card:hover {
            border-color: rgba(14, 165, 233, 0.4);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 14px 0;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            margin: 0 0 35px 0;
            line-height: 1.6;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-secondary {
            background: rgba(14, 165, 233, 0.05);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            background: var(--bg-body);
            color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #00bcff 100%);
            color: white;
            border: none;
            box-shadow: 0 6px 15px rgba(0, 210, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 210, 255, 0.4);
            opacity: 0.95;
        }

        .btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px var(--shadow);
        }
    </style>
</head>
<body>
    <!-- Capa de partículas de fondo -->
    <div id="particles-js"></div>

    <div class="navbar">
        <label class="bb8-toggle" title="Modo Día/Noche">
          <input id="bb8-checkbox" class="bb8-toggle__checkbox" type="checkbox" aria-label="Alternar modo día/noche">
          <div class="bb8-toggle__container">
            <div class="bb8-toggle__scenery">
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="tatto-1"></div>
              <div class="tatto-2"></div>
              <div class="gomrassen"></div>
              <div class="hermes"></div>
              <div class="chenini"></div>
              <div class="bb8-toggle__cloud"></div>
              <div class="bb8-toggle__cloud"></div>
              <div class="bb8-toggle__cloud"></div>
            </div>
            <div class="bb8">
              <div class="bb8__head-container">
                <div class="bb8__antenna"></div>
                <div class="bb8__antenna"></div>
                <div class="bb8__head"></div>
              </div>
              <div class="bb8__body"></div>
            </div>
            <div class="artificial__hidden">
              <div class="bb8__shadow"></div>
            </div>
          </div>
        </label>
    </div>

    <div class="card">
        <h1>🏠 Bienvenida</h1>
        <p>Gestiona tus proyectos y monitorea tus cuentas desde un solo lugar de forma segura.</p>
        
        <div class="buttons">
            <a href="juegos.html" class="btn btn-secondary">🎮 Arcade Lib</a>
            <a href="https://cristianaguilarm-creator.github.io" class="btn btn-primary">✨ Aprende Matemáticas!</a>
        </div>
    </div>

    <script src="JS/estilos-bb8.js"></script>
    
    <!-- CORRECCIÓN: Enlace completo a la librería CDN de Particles.js -->
    <script src="https://jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Configuración inicial de partículas (Modo Día: Azules)
        function cargarParticulas(colorParticula) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": colorParticula },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.4, "random": true },
                    "size": { "value": 4, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": colorParticula, "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
                },
                "interactivity": { "detect_on": "canvas", "events": { "resize": true } }
            });
        }

        // Carga inicial según el estado actual al abrir la web
        const esOscuro = document.body.classList.contains('dark-mode');
        cargarParticulas(esOscuro ? "#ffffff" : "#0284c7");

        // Escuchar el click en tu botón BB8 para actualizar el color de las partículas en tiempo real
        const toggleBtn = document.getElementById('bb8-checkbox');
        if(toggleBtn) {
            toggleBtn.addEventListener('change', function() {
                setTimeout(() => {
                    const modoNocheActivo = document.body.classList.contains('dark-mode');
                    cargarParticulas(modoNocheActivo ? "#ffffff" : "#0284c7");
                }, 50);
            });
        }
    </script>
</body>
</html>
