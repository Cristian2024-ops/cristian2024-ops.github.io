<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web - Home</title>
    <link rel="stylesheet" href="CSS/estilos-tema.css">
    <link rel="stylesheet" href="CSS/estilos-bb8.css">
    <!-- Importamos una tipografía moderna y limpia desde Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .navbar {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        .navbar .bb8-toggle {
            margin-left: 10px;
        }

        /* DISEÑO DE LA TARJETA MEJORADO (Estilo Neumórfico / Vidrio Limpio) */
        .card {
            background: var(--bg-card);
            padding: 3rem 2.5rem;
            border-radius: 24px; /* Bordes más curvos y orgánicos */
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--shadow), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 22px 45px var(--shadow);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 14px 0;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            margin: 0 0 35px 0;
            line-height: 1.6;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }

        /* ESTILO BASE DE LOS BOTONES MEJORADO */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px; /* Bordes suaves que combinan con la tarjeta */
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* BOTÓN SECUNDARIO (Arcade Lib) */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            background: var(--bg-body);
            color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        /* BOTÓN PRINCIPAL PREMIUM (Gradiente y Brillo) */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #00bcff 100%);
            color: white;
            border: none;
            box-shadow: 0 6px 15px rgba(0, 210, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 210, 255, 0.4);
            opacity: 0.95;
        }

        /* Micro-animación al pulsar cualquier botón */
        .btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px var(--shadow);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <!-- BB8 Toggle BOTÓN AQUÍ -->
        <label class="bb8-toggle" title="Modo Día/Noche">
          <input class="bb8-toggle__checkbox" type="checkbox" aria-label="Alternar modo día/noche">
          <div class="bb8-toggle__container">
            <div class="bb8-toggle__scenery">
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="tatto-1"></div>
              <div class="tatto-2"></div>
              <div class="gomrassen"></div>
              <div class="hermes"></div>
              <div class="chenini"></div>
              <div class="bb8-toggle__cloud"></div>
              <div class="bb8-toggle__cloud"></div>
              <div class="bb8-toggle__cloud"></div>
            </div>
            <div class="bb8">
              <div class="bb8__head-container">
                <div class="bb8__antenna"></div>
                <div class="bb8__antenna"></div>
                <div class="bb8__head"></div>
              </div>
              <div class="bb8__body"></div>
            </div>
            <div class="artificial__hidden">
              <div class="bb8__shadow"></div>
            </div>
          </div>
        </label>
    </div>

    <div class="card">
        <h1>🏠 Bienvenida</h1>
        <p>Gestiona tus proyectos y monitorea tus cuentas desde un solo lugar de forma segura.</p>
        
        <div class="buttons">
            <a href="juegos.html" class="btn btn-secondary">🎮 Arcade Lib</a>
            <a href="https://cristianaguilarm-creator.github.io" class="btn btn-primary">✨ Aprende Matemáticas!</a>
        </div>
    </div>

    <script src="JS/estilos-bb8.js"></script>
</body>
</html>
