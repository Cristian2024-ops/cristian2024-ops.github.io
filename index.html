<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web - Home</title>
    <link rel="stylesheet" href="CSS/estilos-tema.css">
    <link rel="stylesheet" href="CSS/estilos-bb8.css">
    <!-- Enlace completo a Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CONTENEDOR PARA LAS PARTÍCULAS */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* Detrás de todo */
            pointer-events: none; /* Permite hacer clic a través de ellas */
        }

        /* FONDO EN MODO DÍA: Azul tecnológico */
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%) !important; 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* CUANDO SE ACTIVA EL MODO OSCURO */
        body.dark-mode {
            background: var(--bg-body) !important;
        }

        .navbar {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        .navbar .bb8-toggle {
            margin-left: 10px;
        }

        /* TARJETA CRISTAL SÚPER TRANSLÚCIDA */
        .card {
            position: relative;
            z-index: 5;
            /* Fondo con opacidad muy baja (0.06) para que sea súper transparente */
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(20px); /* Desenfoque alto para el efecto borroso */
            -webkit-backdrop-filter: blur(20px); /* Soporte para Safari */
            padding: 3rem 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.25); /* Borde estilo cristal */
            box-shadow: 0 20px 40px var(--shadow), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        /* TARJETA EN MODO DÍA: Tinte azulado ultra transparente */
        body:not(.dark-mode) .card { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.04) 100%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 20px 45px rgba(2, 132, 199, 0.4);
        }

        /* Ajuste de color de texto en modo día para asegurar legibilidad */
        body:not(.dark-mode) h1 {
            color: #ffffff !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
        }
        body:not(.dark-mode) p {
            color: #f0fdf4 !important; /* Blanco suave contrastado */
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* TARJETA EN MODO NOCHE: Se adapta para verse profunda sin perder transparencia */
        body.dark-mode .card {
            background: rgba(15, 23, 42, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px var(--shadow);
        }

        body:not(.dark-mode) .card:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 14px 0;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            margin: 0 0 35px 0;
            line-height: 1.6;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Botón secundario adaptado para el cristal */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        body:not(.dark-mode) .btn-secondary {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        body:not(.dark-mode) .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            color: #ffffff;
            border-color: #ffffff;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            background: var(--bg-body);
            color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #00bcff 100%);
            color: white;
            border: none;
            box-shadow: 0 6px 15px rgba(0, 210, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 210, 255, 0.4);
            opacity: 0.95;
        }

        .btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px var(--shadow);
        }
    </style>
</head>
<body>
    <!-- Capa de partículas de fondo -->
    <div id="particles-js"></div>

    <div class="navbar">
        <label class="bb8-toggle" title="Modo Día/Noche">
          <input id="bb8-checkbox" class="bb8-toggle__checkbox" type="checkbox" aria-label="Alternar modo día/noche">
          <div class="bb8-toggle__container">
            <div class="bb8-toggle__scenery">
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="tatto-1"></div>
              <div class="tatto-2"></div>
              <div class="gomrassen"></div>
              <div class="hermes"></div>
              <div class="chenini"></div>
              <div class="bb8-toggle__cloud"></div>
              <div class="bb8-toggle__cloud"></div>
              <div class="bb8-toggle__cloud"></div>
            </div>
            <div class="bb8">
              <div class="bb8__head-container">
                <div class="bb8__antenna"></div>
                <div class="bb8__antenna"></div>
                <div class="bb8__head"></div>
              </div>
              <div class="bb8__body"></div>
            </div>
            <div class="artificial__hidden">
              <div class="bb8__shadow"></div>
            </div>
          </div>
        </label>
    </div>

    <div class="card">
        <h1>🏠 Bienvenida</h1>
        <p>Gestiona tus proyectos y monitorea tus cuentas desde un solo lugar de forma segura.</p>
        
        <div class="buttons">
            <a href="juegos.html" class="btn btn-secondary">🎮 Arcade Lib</a>
            <a href="https://github.io" class="btn btn-primary">✨ Aprende Matemáticas!</a>
        </div>
    </div>

    <script src="JS/estilos-bb8.js"></script>
    
    <!-- Librería local -->
    <script src="JS/particles.min.js"></script>
    <script>
        // Configuración de partículas
        function cargarParticulas(colorParticula) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 65, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": colorParticula },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.5, "random": true },
                    "size": { "value": 4, "random": true },
                    "line_linked": { "enable": true, "distance": 140, "color": colorParticula, "opacity": 0.25, "width": 1 },
                    "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
                },
                "interactivity": { "detect_on": "canvas", "events": { "resize": true } }
            });
        }

        // Partículas blancas fijas para que se luzcan en ambos fondos
        cargarParticulas("#ffffff");

        const toggleBtn = document.getElementById('bb8-checkbox');
        if(toggleBtn) {
            toggleBtn.addEventListener('change', function() {
                setTimeout(() => {
                    cargarParticulas("#ffffff");
                }, 50);
            });
        }
    </script>
</body>
</html>
