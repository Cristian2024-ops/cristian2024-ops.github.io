<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Biblioteca de Juegos</title>
    <style>
        :root {
            --bg-body: #f6f8fa;
            --bg-card: #ffffff;
            --text-main: #24292f;
            --text-muted: #57606a;
            --accent: #0969da;
            --border: #d0d7de;
            --shadow: rgba(140, 149, 159, 0.1);
        }

        body.dark-mode {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: background 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .navbar .bb8-toggle { margin-left: 10px; }

        .btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            border-color: var(--accent);
            background: var(--bg-body);
        }

        .game-display {
            width: 100%;
            max-width: 1000px;
            height: 65vh;
            background: #000;
            border: 2px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 10px 30px var(--shadow);
            display: none; 
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
        }

        .close-game {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .grid-juegos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card-juego {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-juego:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px var(--shadow);
        }

        .card-juego h3 {
            margin: 0;
            font-size: 18px;
            color: var(--accent);
        }

        .card-juego p {
            margin: 8px 0 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .divider {
            display: flex; align-items: center; text-align: center;
            margin: 20px 0; color: #57606a; font-size: 12px;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #d0d7de; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        .user-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 15px;
        }
        .username {
            color: #0969da;
            font-weight: bold;
            font-size:14px;
        }
        /* ------------ BB8 Toggle: COPIA/PEGA TU CSS BB8 AQUÍ ------------- */

        /* ... (TODO EL CSS, HOLA A QUIÉN ESTE VIENDO EL MENSAJE) ... */
        /* ----------------------------------------------------------------- */
    </style>
    <!-- Auth0 SDK -->
    <script src="https://cdn.auth0.com/js/auth0/9.27/auth0.min.js"></script>
    <script>
    // --- Auth0 config ---
    const auth0 = new auth0.WebAuth({
      domain:     'dev-bzsbnr5w8wtmmiqg.us.auth0.com',
      clientID:   'S8fcQCKtU9G3FD6ConZSspY8eVOxaM5Q',
      redirectUri: "https://cristian2024-ops.github.io/login",
      responseType: 'token id_token',
      scope: 'openid profile email'
    });

    function isLoggedIn() {
      var expiresAt = JSON.parse(sessionStorage.getItem('expires_at') || '0');
      return new Date().getTime() < expiresAt;
    }

    window.onload = function() {
      // Tema
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        // Sincroniza el toggle, si existe
        const chk = document.querySelector('.bb8-toggle__checkbox');
        if(chk) chk.checked = true;
      }
      // Sin sesión, redirige
      if (!isLoggedIn()) {
        window.location.href = "/login";
        return;
      }
      // Mostrar perfil y botón logout
      auth0.client.userInfo(sessionStorage.getItem('access_token'), function(err, profile) {
        if (profile) {
          const navbar = document.querySelector('.navbar');
          // Saludo y avatar
          let userBar = document.createElement('div');
          userBar.className = 'user-bar';
          if(profile.picture){
              let avatar = document.createElement('img');
              avatar.src = profile.picture;
              avatar.alt = "avatar";
              avatar.style="width:28px;height:28px;border-radius:50%;object-fit:cover;";
              userBar.appendChild(avatar);
          }
          let nameSpan = document.createElement('span');
          nameSpan.className = 'username';
          nameSpan.textContent = `Hola, ${profile.nickname || profile.name}`;
          userBar.appendChild(nameSpan);
          // Cerrar sesión
          let logoutBtn = document.createElement('button');
          logoutBtn.textContent = "Cerrar sesión";
          logoutBtn.className = "btn";
          logoutBtn.onclick = function() {
            sessionStorage.clear();
            window.location.href =
              `https://${auth0.baseOptions.domain}/v2/logout?returnTo=${encodeURIComponent("https://cristian2024-ops.github.io/login")}&client_id=${auth0.baseOptions.clientID}`;
          };
          userBar.appendChild(logoutBtn);
          navbar.appendChild(userBar);
        }
      });

      // Sincronizar toggle con theme (si carga después del HTML)
      const chk = document.querySelector('.bb8-toggle__checkbox');
      if(localStorage.getItem('theme') === 'dark' && chk) chk.checked = true;
    };
    </script>
</head>
<body>
<div id="offline-message" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 50px; z-index: 9999; border: 2px solid #00d2ff; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">

    <div id="pantalla" class="game-display">
        <button class="close-game" onclick="cerrarJuego()">×</button>
        <iframe id="visor" src=""></iframe>
    </div>

    <!-- ... resto de tu HTML ... (grid de juegos, etc.) ... -->
    <!-- (No se modifica nada más) -->

    <script>
        function lanzar(url) {
            const pantalla = document.getElementById('pantalla');
            const visor = document.getElementById('visor');
            
            pantalla.style.display = "block";
            visor.src = url;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cerrarJuego() {
            const pantalla = document.getElementById('pantalla');
            const visor = document.getElementById('visor');
            pantalla.style.display = "none";
            visor.src = ""; // Detiene el audio del juego
        }

        // Manejo modo oscuro BB8
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.querySelector('.bb8-toggle__checkbox');
            if(toggle){
                // Inicial: sincroniza con localStorage
                if(localStorage.getItem('theme') === 'dark'){
                    document.body.classList.add('dark-mode');
                    toggle.checked = true;
                }
                toggle.addEventListener('change', function(e){
                    if(e.target.checked){
                        document.body.classList.add('dark-mode');
                        localStorage.setItem('theme','dark');
                    }else{
                        document.body.classList.remove('dark-mode');
                        localStorage.setItem('theme','light');
                    }
                });
            }
        });

        // Función que revisa la conexión
        function actualizarEstadoRed() {
            const mensaje = document.getElementById('offline-message');
            if (navigator.onLine) {
                mensaje.style.display = "none";
            } else {
                mensaje.style.display = "block";
            }
        }

        window.addEventListener('online', actualizarEstadoRed);
        window.addEventListener('offline', actualizarEstadoRed);
        actualizarEstadoRed();
    </script>
</body>
</html>
