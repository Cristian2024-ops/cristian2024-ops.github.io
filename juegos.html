<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Biblioteca de Juegos</title>
    <style>
        :root {
            --bg-body: #f6f8fa;
            --bg-card: #ffffff;
            --text-main: #24292f;
            --text-muted: #57606a;
            --accent: #0969da;
            --border: #d0d7de;
            --shadow: rgba(140, 149, 159, 0.1);
        }

        /* Variables para Modo Oscuro */
        body.dark-mode {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: background 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            border-color: var(--accent);
            background: var(--bg-body);
        }

        /* Contenedor del Juego mejorado */
        .game-display {
            width: 100%;
            max-width: 1000px;
            height: 65vh; /* Altura relativa al dispositivo */
            background: #000;
            border: 2px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 10px 30px var(--shadow);
            display: none; 
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
        }

        /* Botón para cerrar el juego */
        .close-game {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .grid-juegos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card-juego {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-juego:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px var(--shadow);
        }

        .card-juego h3 {
            margin: 0;
            font-size: 18px;
            color: var(--accent);
        }

        .card-juego p {
            margin: 8px 0 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Animación para que aparezca suave */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="btn">🏠 Inicio</a>
        <h2 style="margin:0; font-size: 1.2rem;">🎮 Arcade Lib</h2>
        <button class="btn" onclick="toggleDarkMode()">🌓 Modo</button>
    </div>

    <div id="pantalla" class="game-display">
        <button class="close-game" onclick="cerrarJuego()">×</button>
        <iframe id="visor" src=""></iframe>
    </div>

    <div class="grid-juegos">
        <!-- Ejemplo con un juego que suele permitir iframe -->
        <div class="card-juego fade-in" onclick="lanzar('https://retrogames.cc')">
            <h3>🍄 Mario Bros</h3>
            <p>Clásico Retro (Emu)</p>
        </div>
        
        <div class="card-juego fade-in" onclick="lanzar('https://skribbl.io')">
            <h3>🎨 Skribbl.io</h3>
            <p>Dibuja y adivina</p>
        </div>

        <div class="card-juego fade-in" onclick="lanzar('https://diep.io')">
            <h3>🚀 Diep.io</h3>
            <p>Batalla de tanques</p>
        </div>
    </div>

    <script>
        function lanzar(url) {
            const pantalla = document.getElementById('pantalla');
            const visor = document.getElementById('visor');
            
            pantalla.style.display = "block";
            visor.src = url;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cerrarJuego() {
            const pantalla = document.getElementById('pantalla');
            const visor = document.getElementById('visor');
            pantalla.style.display = "none";
            visor.src = ""; // Detiene el audio del juego
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            // Guardar preferencia
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Cargar preferencia al iniciar
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
            </html>
