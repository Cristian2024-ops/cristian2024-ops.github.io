<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.auth0.com/js/auth0/9.27/auth0.min.js"></script>
    <title>Login Auth0 - Mi Web</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; padding: 2rem; border-radius: 10px; width: 320px; box-shadow: 0 8px 24px 0 rgba(140,149,159,0.1);}
        h1 { text-align: center; }
        #user-profile { margin-top: 1rem; text-align: center; }
        .btn { display: block; width: 100%; margin-top: 1rem; padding: 12px; border-radius: 6px; font-size: 1.06em; border: none; background: #1a53ff; color: white; cursor: pointer;}
        .btn.alt { background: #ff414d; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bienvenido</h1>
        <div id="auth-buttons">
            <button class="btn" id="login" style="display:none;">Iniciar sesión con Auth0</button>
            <button class="btn alt" id="logout" style="display:none;">Cerrar sesión</button>
        </div>
        <div id="user-profile"></div>
    </div>

    <script>
        // MÉTODO OFICIAL SPA Auth0
        var auth0 = new auth0.WebAuth({
            domain:     'dev-bzsbnr5w8wtmmiqg.us.auth0.com',
            clientID:   'S8fcQCKtU9G3FD6ConZSspY8eVOxaM5Q',
            redirectUri: "https://cristian2024-ops.github.io/login",
            responseType: 'token id_token',
            scope: 'openid profile email'
        });

        // Al cargar la página...
        window.onload = function() { handleAuth(); };

        function handleAuth() {
            auth0.parseHash(function(err, authResult) {
                if (authResult && authResult.accessToken && authResult.idToken) {
                    window.location.hash = '';
                    localLogin(authResult);
                } else if (err) {
                    alert('Error: ' + err.error + '\n' + err.errorDescription);
                } else {
                    renewTokens();
                }
            });
        }

        function localLogin(authResult) {
            sessionStorage.setItem('access_token', authResult.accessToken);
            sessionStorage.setItem('id_token', authResult.idToken);
            sessionStorage.setItem('expires_at', JSON.stringify((authResult.expiresIn * 1000) + new Date().getTime()));
            showProfile();
        }

        function renewTokens() {
            var expiresAt = JSON.parse(sessionStorage.getItem('expires_at') || '0');
            if(new Date().getTime() < expiresAt) {
                showProfile();
            } else {
                showLoggedOut();
            }
        }

        function isLoggedIn() {
            var expiresAt = JSON.parse(sessionStorage.getItem('expires_at') || '0');
            return new Date().getTime() < expiresAt;
        }

        function showProfile() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('logout').style.display = '';
            auth0.client.userInfo(sessionStorage.getItem('access_token'), function(err, profile) {
                if (profile) {
                    document.getElementById('user-profile').innerHTML =
                        `<div>
                            <img src="${profile.picture}" alt="avatar" style="width:60px;border-radius:50%;margin-bottom:6px;"><br>
                            <strong>${profile.nickname || profile.name}</strong><br>
                            <small>${profile.email || ''}</small>
                        </div>`;
                }
            });
        }

        function showLoggedOut() {
            document.getElementById('login').style.display = '';
            document.getElementById('logout').style.display = 'none';
            document.getElementById('user-profile').innerHTML = '';
        }

        document.getElementById('login').onclick = function() {
            auth0.authorize();
        };
        document.getElementById('logout').onclick = function() {
            sessionStorage.clear();
            window.location.href = 
                `https://${auth0.baseOptions.domain}/v2/logout?returnTo=${encodeURIComponent(window.location.origin)}&client_id=${auth0.baseOptions.clientID}`;
        };
    </script>
</body>
</html>
