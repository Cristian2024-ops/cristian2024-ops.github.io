<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.auth0.com/js/auth0/9.27/auth0.min.js"></script>
    <title>Login Auth0 - Mi Web</title>
    <link rel="stylesheet" href="CSS/estilos-tema.css">
    <link rel="stylesheet" href="CSS/estilos-bb8.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CONTENEDOR PARA LAS PARTÍCULAS */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* FONDO EN MODO DÍA: Azul tecnológico */
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%) !important; 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* CUANDO SE ACTIVA EL MODO OSCURO */
        body.dark-mode {
            background: var(--bg-body) !important;
        }

        .navbar {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        .navbar .bb8-toggle {
            margin-left: 10px;
        }

        /* TARJETA CRISTAL SÚPER TRANSLÚCIDA CORREGIDA */
        .card {
            position: relative;
            z-index: 5;
            background: rgba(255, 255, 255, 0.02) !important; 
            backdrop-filter: blur(10px) !important; 
            -webkit-backdrop-filter: blur(10px) !important; 
            padding: 3rem 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            box-shadow: 0 20px 40px var(--shadow), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        /* TARJETA EN MODO DÍA */
        body:not(.dark-mode) .card { 
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.25) !important;
            box-shadow: 0 20px 45px rgba(2, 132, 199, 0.15) !important;
        }

        /* Ajuste de color de texto en modo día */
        body:not(.dark-mode) h1 {
            color: #ffffff !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
        }
        body:not(.dark-mode) p, body:not(.dark-mode) #user-profile {
            color: #f0fdf4 !important; 
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px var(--shadow);
        }

        body:not(.dark-mode) .card:hover {
            border-color: rgba(255, 255, 255, 0.5);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 14px 0;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        #user-profile {
            margin-top: 1rem;
            font-size: 15px;
            color: var(--text-muted);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px; 
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        /* Botón de Iniciar Sesión (Estilo Primario) */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #00bcff 100%) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 6px 15px rgba(0, 210, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 210, 255, 0.4);
            opacity: 0.95;
        }

        /* Botón de Cerrar Sesión (Estilo Alerta/Secundario) */
        .btn-danger {
            background: rgba(255, 65, 77, 0.15) !important;
            border: 1px solid rgba(255, 65, 77, 0.4) !important;
            color: #ff414d !important;
        }

        .btn-danger:hover {
            background: #ff414d !important;
            color: white !important;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 65, 77, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px var(--shadow);
        }
        .btn:disabled { background: #ccc !important; color: #666 !important; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="navbar">
        <label class="bb8-toggle" title="Modo Día/Noche">
          <input id="bb8-checkbox" class="bb8-toggle__checkbox" type="checkbox" aria-label="Alternar modo día/noche">
          <div class="bb8-toggle__container">
            <div class="bb8-toggle__scenery">
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="bb8-toggle__star"></div>
              <div class="tatto-1"></div>
              <div class="tatto-2"></div>
              <div class="gomrassen"></div>
              <div class="hermes"></div>
              <div class="chenini"></div>
              <div class="bb8-toggle__cloud"></div>
              <div class="bb8-toggle__cloud"></div>
              <div class="bb8-toggle__cloud"></div>
            </div>
            <div class="bb8">
              <div class="bb8__head-container">
                <div class="bb8__antenna"></div>
                <div class="bb8__antenna"></div>
                <div class="bb8__head"></div>
              </div>
              <div class="bb8__body"></div>
            </div>
            <div class="artificial__hidden">
              <div class="bb8__shadow"></div>
            </div>
          </div>
        </label>
    </div>

    <div class="card">
        <h1>🔒 Autenticación</h1>
        <p id="auth-msg">Ingresa de forma segura para gestionar tu perfil.</p>
        
        <div class="buttons">
            <button class="btn btn-primary" id="login" style="display:none;">🔑 Iniciar sesión con Auth0</button>
            <button class="btn btn-danger" id="logout" style="display:none;">🚪 Cerrar sesión</button>
        </div>
        
        <div id="user-profile"></div>
    </div>

    <script src="JS/estilos-bb8.js"></script>
    <script src="JS/particles.min.js"></script>
    <script>
        // Configuración de partículas idéntica al index
        function cargarParticulas(colorParticula) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": colorParticula },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.75, "random": false }, 
                    "size": { "value": 4.5, "random": true },
                    "line_linked": { 
                        "enable": true, 
                        "distance": 145, 
                        "color": colorParticula, 
                        "opacity": 0.45, 
                        "width": 1.5 
                    },
                    "move": { "enable": true, "speed": 2.2, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
                },
                "interactivity": { "detect_on": "canvas", "events": { "resize": true } }
            });
        }

        cargarParticulas("#ffffff");

        const toggleBtn = document.getElementById('bb8-checkbox');
        if(toggleBtn) {
            toggleBtn.addEventListener('change', function() {
                setTimeout(() => {
                    cargarParticulas("#ffffff");
                }, 50);
            });
        }

        // LÓGICA SPA Auth0
        var auth0 = new auth0.WebAuth({
            domain:     'dev-bzsbnr5w8wtmmiqg.us.auth0.com',
            clientID:   'S8fcQCKtU9G3FD6ConZSspY8eVOxaM5Q',
            redirectUri: "https://cristian2024-ops.github.io/login.html", 
            responseType: 'token id_token',
            scope: 'openid profile email'
        });

        window.onload = function() { 
            handleAuth(); 
        };

        function handleAuth() {
            auth0.parseHash(function(err, authResult) {
                if (authResult && authResult.accessToken && authResult.idToken) {
                    window.location.hash = '';
                    localLogin(authResult);
                } else if (err) {
                    alert('Error: ' + err.error + '\n' + err.errorDescription);
                } else {
                    renewTokens();
                }
            });
        }

        function localLogin(authResult) {
            sessionStorage.setItem('access_token', authResult.accessToken);
            sessionStorage.setItem('id_token', authResult.idToken);
            sessionStorage.setItem('expires_at', JSON.stringify((authResult.expiresIn * 1000) + new Date().getTime()));
            showProfile();
        }

        function renewTokens() {
            var expiresAt = JSON.parse(sessionStorage.getItem('expires_at') || '0');
            if(new Date().getTime() < expiresAt) {
                showProfile();
            } else {
                showLoggedOut();
            }
        }

        function showProfile() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('logout').style.display = '';
            document.getElementById('auth-msg').style.display = 'none';
            auth0.client.userInfo(sessionStorage.getItem('access_token'), function(err, profile) {
                if (profile) {
                    document.getElementById('user-profile').innerHTML =
                        `<div>
                            <img src="${profile.picture}" alt="avatar" style="width:65px;border-radius:50%;margin-bottom:10px;box-shadow: 0 4px 10px rgba(0,0,0,0.2);"><br>
                            <strong style="font-size: 1.2rem; display:block; margin-bottom:2px;">${profile.nickname || profile.name}</strong>
                            <small style="opacity:0.8;">${profile.email || ''}</small>
                        </div>`;
                }
            });
        }

        function showLoggedOut() {
            document.getElementById('login').style.display = '';
            document.getElementById('logout').style.display = 'none';
            document.getElementById('auth-msg').style.display = '';
            document.getElementById('user-profile').innerHTML = '';
        }

        document.getElementById('login').onclick = function() {
            auth0.authorize();
        };
        document.getElementById('logout').onclick = function() {
            sessionStorage.clear();
            window.location.href = 
                `https://${auth0.baseOptions.domain}/v2/logout?returnTo=${encodeURIComponent(window.location.origin)}&client_id=${auth0.baseOptions.clientID}`;
        };
    </script>
</body>
</html>
