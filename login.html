<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mi Web</title>
    <style>
        /* Usamos los mismos estilos que tu index */
        body { font-family: -apple-system, sans-serif; background-color: #f6f8fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; border: 1px solid #d0d7de; box-shadow: 0 8px 24px rgba(140, 149, 159, 0.1); width: 320px; }
        h1 { font-size: 24px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #d0d7de; box-sizing: border-box; }
        .btn-primary { background-color: #0969da; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary:hover { background-color: #0860ca; }
        .footer { text-align: center; margin-top: 15px; font-size: 14px; }
        a { color: #0969da; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Iniciar Sesión</h1>
        <input type="text" placeholder="Nombre de usuario">
        <input type="password" placeholder="Contraseña">
        <!-- Al hacer clic, nos manda al panel de juegos que querías -->
        <button class="btn-primary" onclick="window.location.href='juegos.html'">Entrar</button>
        <div class="footer">
            ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
        </div>
    </div>
</body>
</html>
