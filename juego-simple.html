<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            display: flex; justify-content: center; align-items: center;
        }
        #contenedor { 
            position: relative; 
            width: 100vw; height: 100vh; /* Ocupa todo el ancho y alto visual */
        }
        canvas { 
            display: block; background: #0a0a0a; 
            width: 100%; height: 100%; 
        }
        #ui-puntos {
            position: absolute; top: 20px; left: 20px;
            color: #0f0; font-family: sans-serif; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px #000; pointer-events: none; z-index: 5;
        }
        #mensaje-inicio {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; text-align: center; z-index: 10; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="contenedor">
        <div id="ui-puntos">PUNTOS: 0</div>
        <div id="mensaje-inicio" onclick="iniciar()">
            <h1 style="margin-bottom:10px;">¡TOCA PARA JUGAR!</h1>
            <p>Esquiva los bloques rojos</p>
        </div>
        <canvas id="juegoCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("juegoCanvas");
        const ctx = canvas.getContext("2d");
        const uiPuntos = document.getElementById("ui-puntos");
        const mensaje = document.getElementById("mensaje-inicio");

        // --- AJUSTE DINÁMICO DE TAMAÑO ---
        function ajustarPantalla() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Reposicionar suelo y personajes según el nuevo alto
            sueloY = canvas.height * 0.8; 
            y = sueloY - tam;
            obsY = sueloY - obsTam;
        }

        let tam = 50; 
        let x = 50, y = 0;
        let obsX = 0, obsY = 0, obsTam = 50, velocidad = 5;
        let sueloY = 0;
        let puntos = 0, saltando = false, juegoCorriendo = false;

        window.addEventListener('resize', ajustarPantalla);
        ajustarPantalla(); // Ajustar al cargar

        function iniciar() {
            mensaje.style.display = "none";
            juegoCorriendo = true;
            obsX = canvas.width + 100; // Que el obstáculo empiece fuera
            window.focus();
        }

        function dibujar() {
            if (juegoCorriendo) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Suelo (Línea decorativa)
                ctx.strokeStyle = "#444";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(0, sueloY + 5);
                ctx.lineTo(canvas.width, sueloY + 5);
                ctx.stroke();

                // Jugador
                ctx.fillStyle = "#008080"; 
                ctx.fillRect(x, y, tam, tam);

                // Obstáculo
                ctx.fillStyle = "#8b0000";
                ctx.fillRect(obsX, obsY, obsTam, obsTam);

                obsX -= velocidad;
                if (obsX < -obsTam) {
                    obsX = canvas.width + 50;
                    puntos++;
                    uiPuntos.innerText = "PUNTOS: " + puntos;
                    velocidad += 0.2;
                }

                // Colisión
                if (x < obsX + obsTam && x + tam > obsX && y < obsY + obsTam && y + tam > obsY) {
                    juegoCorriendo = false;
                    alert("¡GAME OVER! PUNTOS: " + puntos);
                    location.reload();
                }
            }
            requestAnimationFrame(dibujar);
        }

        function saltar() {
            if (!saltando && juegoCorriendo) {
                saltando = true;
                let fuerza = 18;
                let gravedad = 0.9;
                let nivelSuelo = sueloY - tam;

                let idSalto = setInterval(() => {
                    y -= fuerza;
                    fuerza -= gravedad;
                    if (y >= nivelSuelo) {
                        y = nivelSuelo;
                        saltando = false;
                        clearInterval(idSalto);
                    }
                }, 16);
            }
        }

        // Controles
        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); saltar(); } });
        window.addEventListener("touchstart", (e) => { e.preventDefault(); saltar(); }, {passive: false});

        dibujar();
    </script>
</body>
</html>
