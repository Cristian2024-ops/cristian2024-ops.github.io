<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juego Móvil HTML5</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; /* Evita que la pantalla se mueva al tocar */
            background: #222; 
            font-family: Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        canvas { 
            background: #000; 
            max-width: 100%; 
            max-height: 100%;
            border: 2px solid #555;
        }
    </style>
</head>
<body>
    <canvas id="juegoCanvas"></canvas>

    <script>
        const canvas = document.getElementById("juegoCanvas");
        const ctx = canvas.getContext("2d");

        // Ajustar tamaño del canvas a la pantalla
        canvas.width = 400;
        canvas.height = 400;

        let x = 50, y = 350, tam = 30;
        let obsX = 400, obsY = 350, obsTam = 30, velocidad = 3;
        let puntos = 0;
        let saltando = false;

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Puntos
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Puntos: " + puntos, 20, 40);

            // Jugador
            ctx.fillStyle = "cyan";
            ctx.fillRect(x, y, tam, tam);

            // Obstáculo
            ctx.fillStyle = "red";
            ctx.fillRect(obsX, obsY, obsTam, obsTam);

            // Movimiento
            obsX -= velocidad;
            if (obsX < -obsTam) {
                obsX = 400;
                puntos++;
                velocidad += 0.2;
            }

            // Colisión
            if (x < obsX + obsTam && x + tam > obsX && y < obsY + obsTam && y + tam > obsY) {
                alert("Fin del juego. Puntos: " + puntos);
                puntos = 0;
                velocidad = 3;
                obsX = 400;
            }

            requestAnimationFrame(dibujar);
        }

        // --- FUNCIÓN DE SALTO ---
        function saltar() {
            if (!saltando) {
                saltando = true;
                let alturaInicial = y;
                let impulso = 15;
                let gravedad = 0.8;
                
                let intervaloSalto = setInterval(() => {
                    y -= impulso;
                    impulso -= gravedad;
                    
                    if (y >= alturaInicial) {
                        y = alturaInicial;
                        saltando = false;
                        clearInterval(intervaloSalto);
                    }
                }, 20);
            }
        }

        // --- CONTROLES (PC y MÓVIL) ---
        // 1. Escuchar el teclado (Espacio)
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") saltar();
        });

        // 2. Escuchar toques en la pantalla (Móvil)
        window.addEventListener("touchstart", (e) => {
            e.preventDefault(); // Evita el zoom o scroll al tocar
            saltar();
        }, { passive: false });

        dibujar();
    </script>
</body>
</html>
