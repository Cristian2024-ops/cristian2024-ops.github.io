<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Chrome Original Style</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f7f7f7; font-family: Arial, sans-serif; overflow: hidden; }
        canvas { background: #fff; border-bottom: 2px solid #535353; max-width: 100%; }
        .instrucciones { position: absolute; top: 20px; color: #535353; font-weight: bold; }
    </style>
</head>
<body>

    <div class="instrucciones">ESPACIO: Saltar | FLECHA ABAJO: Agacharse</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // --- Configuración y Carga de Imágenes ---
        canvas.width = 800;
        canvas.height = 200;

        const sprite = new Image();
        sprite.src = "https://githubusercontent.com";

        let score = 0;
        let gameSpeed = 7;
        let isGameOver = false;
        let frame = 0;

        // --- Clases del Juego ---

        const dino = {
            x: 50, y: 150, w: 44, h: 47,
            frame: 0,
            vY: 0,
            gravity: 0.8,
            jumpForce: -12,
            isJumping: false,
            isDucking: false,

            update() {
                // Saltar
                if (this.isJumping) {
                    this.vY += this.gravity;
                    this.y += this.vY;
                }

                // Suelo
                if (this.y >= 150) {
                    this.y = 150;
                    this.isJumping = false;
                    this.vY = 0;
                }

                // Animación (cambia cada 10 frames)
                if (frame % 8 === 0) this.frame = this.frame === 0 ? 1 : 0;
                
                this.draw();
            },

            draw() {
                let clipX = 1338; // Posición Dino en el sprite
                let clipW = 44, clipH = 47;

                if (this.isDucking && !this.isJumping) {
                    clipX = 1866 + (this.frame * 59); // Sprite agachado
                    clipW = 59;
                    ctx.drawImage(sprite, clipX, 36, clipW, 30, this.x, this.y + 17, clipW, 30);
                } else if (this.isJumping) {
                    ctx.drawImage(sprite, 1338, 2, 44, 47, this.x, this.y, 44, 47);
                } else {
                    clipX = 1514 + (this.frame * 44); // Sprite corriendo
                    ctx.drawImage(sprite, clipX, 2, 44, 47, this.x, this.y, 44, 47);
                }
            }
        };

        const obstacles = [];

        function spawnObstacle() {
            const chance = Math.random();
            if (score > 500 && chance < 0.3) { // Pterodáctilos después de 500 puntos
                const heights = [150, 120, 80]; // Suelo, medio, alto
                obstacles.push({ type: 'bird', x: 800, y: heights[Math.floor(Math.random()*3)], w: 46, h: 40, frame: 0 });
            } else {
                obstacles.push({ type: 'cactus', x: 800, y: 155, w: 25, h: 40 });
            }
        }

        // --- Bucle Principal ---

        function loop() {
            if (isGameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frame++;
            score++;

            // Suelo (línea infinita)
            ctx.drawImage(sprite, 2, 104, 1200, 12, -(frame * gameSpeed % 1200), 185, 1200, 12);
            ctx.drawImage(sprite, 2, 104, 1200, 12, -(frame * gameSpeed % 1200) + 1200, 185, 1200, 12);

            // Marcador
            ctx.fillStyle = "#535353";
            ctx.font = "18px 'Courier New'";
            ctx.fillText(String(Math.floor(score/10)).padStart(5, '0'), 730, 30);

            dino.update();

            // Obstáculos
            if (frame % Math.max(60, Math.floor(100 - gameSpeed)) === 0) spawnObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed;

                if (o.type === 'cactus') {
                    ctx.drawImage(sprite, 446, 2, 34, 70, o.x, o.y, 25, 40);
                } else {
                    if (frame % 15 === 0) o.frame = o.frame === 0 ? 1 : 0;
                    ctx.drawImage(sprite, 260 + (o.frame * 46), 2, 46, 40, o.x, o.y, 46, 40);
                }

                // Colisión (ajustada para ser más justa)
                if (dino.x < o.x + o.w - 5 && dino.x + dino.w - 5 > o.x && dino.y < o.y + o.h - 5 && dino.y + dino.h - 5 > o.y) {
                    gameOver();
                }

                if (o.x < -100) obstacles.splice(i, 1);
            }

            if (score % 1000 === 0) gameSpeed += 0.5;
            requestAnimationFrame(loop);
        }

        function gameOver() {
            isGameOver = true;
            ctx.drawImage(sprite, 954, 29, 191, 11, 300, 80, 191, 11); // Texto Game Over
            ctx.drawImage(sprite, 2, 2, 36, 32, 380, 110, 36, 32); // Botón Restart
        }

        // --- Controles ---

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" || e.code === "ArrowUp") {
                if (isGameOver) location.reload();
                else if (!dino.isJumping) { dino.isJumping = true; dino.vY = dino.jumpForce; }
            }
            if (e.code === "ArrowDown") dino.isDucking = true;
        });

        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowDown") dino.isDucking = false;
        });

        sprite.onload = loop;

    </script>
</body>
</html>
