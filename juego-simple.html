<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #000; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; font-family: sans-serif;
        }
        canvas { background: #111; width: 100%; height: 100%; max-width: 400px; max-height: 400px; display: block; }
        
        /* Capa inicial para activar el iframe */
        #overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="overlay" onclick="iniciarJuego()">
        <h2>TAP PARA JUGAR</h2>
        <p>(Usa Espacio o Touch)</p>
    </div>
    <canvas id="juegoCanvas"></canvas>

    <script>
        const canvas = document.getElementById("juegoCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");

        canvas.width = 400; canvas.height = 400;

        let x = 50, y = 350, tam = 30;
        let obsX = 400, obsY = 350, obsTam = 30, velocidad = 3;
        let puntos = 0, saltando = false, juegoActivo = false;

        function iniciarJuego() {
            overlay.style.display = "none";
            juegoActivo = true;
            window.focus(); // Obliga al iframe a tomar el foco para detectar el teclado
        }

        function dibujar() {
            if (!juegoActivo) return requestAnimationFrame(dibujar);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Marcador
            ctx.fillStyle = "yellow";
            ctx.font = "bold 20px Arial";
            ctx.fillText("SCORE: " + puntos, 20, 40);

            // Suelo
            ctx.strokeStyle = "#333";
            ctx.beginPath(); ctx.moveTo(0, 380); ctx.lineTo(400, 380); ctx.stroke();

            // Jugador y Obstáculo
            ctx.fillStyle = "cyan"; ctx.fillRect(x, y, tam, tam);
            ctx.fillStyle = "#ff4444"; ctx.fillRect(obsX, obsY, obsTam, obsTam);

            obsX -= velocidad;
            if (obsX < -obsTam) { obsX = 400; puntos++; velocidad += 0.1; }

            if (x < obsX + obsTam && x + tam > obsX && y < obsY + obsTam && y + tam > obsY) {
                juegoActivo = false;
                alert("Game Over! Score: " + puntos);
                location.reload(); // Reinicia el iframe
            }

            requestAnimationFrame(dibujar);
        }

        function saltar() {
            if (!saltando && juegoActivo) {
                saltando = true;
                let impulso = 12;
                let g = 0.6;
                let vY = impulso;
                
                let loopSalto = setInterval(() => {
                    y -= vY;
                    vY -= g;
                    if (y >= 350) {
                        y = 350; saltando = false;
                        clearInterval(loopSalto);
                    }
                }, 20);
            }
        }

        // Eventos
        window.addEventListener("keydown", (e) => { 
            if (e.code === "Space") {
                e.preventDefault(); // Evita que la página principal baje al saltar
                saltar();
            }
        });
        
        window.addEventListener("touchstart", (e) => {
            if (juegoActivo) {
                e.preventDefault(); 
                saltar();
            }
        }, { passive: false });

        dibujar();
    </script>
</body>
</html>
