<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Ajustes para que quepa perfecto en tu sitio de Arcade */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #000; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; font-family: 'Courier New', Courier, monospace;
        }
        #contenedor { position: relative; width: 100%; height: 100%; max-width: 400px; max-height: 400px; }
        canvas { background: #0a0a0a; width: 100%; height: 100%; display: block; border-bottom: 2px solid #333; }
        
        /* Contador persistente arriba a la izquierda */
        #ui-puntos {
            position: absolute; top: 10px; left: 15px;
            color: #0f0; font-size: 20px; font-weight: bold;
            text-shadow: 2px 2px #000; pointer-events: none; /* No estorba al tocar */
        }

        #mensaje-inicio {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center;
            color: white; cursor: pointer; text-align: center; font-size: 1.2rem;
        }
    </style>
</head>
<body onclick="enfocarIframe()">
    <div id="contenedor">
        <div id="ui-puntos">PUNTOS: 0</div>
        <div id="mensaje-inicio" onclick="iniciar()">CLICK AQUÍ PARA ACTIVAR</div>
        <canvas id="juegoCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("juegoCanvas");
        const ctx = canvas.getContext("2d");
        const uiPuntos = document.getElementById("ui-puntos");
        const mensaje = document.getElementById("mensaje-inicio");

        canvas.width = 400; canvas.height = 400;

        let x = 50, y = 340, tam = 40; // Personaje un poco más grande
        let obsX = 450, obsY = 340, obsTam = 40, velocidad = 4;
        let puntos = 0, saltando = false, juegoCorriendo = false;

        // ESTO SOLUCIONA EL SALTO EN IFRAME
        function enfocarIframe() {
            window.focus();
        }

        function iniciar() {
            mensaje.style.display = "none";
            juegoCorriendo = true;
            window.focus(); 
        }

        function dibujar() {
            if (juegoCorriendo) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Jugador (Verde como en tu imagen)
                ctx.fillStyle = "#008080"; 
                ctx.fillRect(x, y, tam, tam);

                // Obstáculo (Rojo)
                ctx.fillStyle = "#8b0000";
                ctx.fillRect(obsX, obsY, obsTam, obsTam);

                obsX -= velocidad;
                if (obsX < -obsTam) {
                    obsX = 400;
                    puntos++;
                    uiPuntos.innerText = "PUNTOS: " + puntos; // Actualiza el texto HTML
                    velocidad += 0.2;
                }

                // Colisión
                if (x < obsX + obsTam && x + tam > obsX && y < obsY + obsTam && y + tam > obsY) {
                    juegoCorriendo = false;
                    alert("¡Perdiste! Puntos: " + puntos);
                    location.reload(); 
                }
            }
            requestAnimationFrame(dibujar);
        }

        function saltar() {
            if (!saltando && juegoCorriendo) {
                saltando = true;
                let fuerza = 15;
                let gravedad = 0.8;
                let posOriginal = 340;

                let idSalto = setInterval(() => {
                    y -= fuerza;
                    fuerza -= gravedad;
                    if (y >= posOriginal) {
                        y = posOriginal;
                        saltando = false;
                        clearInterval(idSalto);
                    }
                }, 20);
            }
        }

        // Eventos mejorados para detectar siempre
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                saltar();
            }
        });

        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault();
            saltar();
        }, {passive: false});

        dibujar();
    </script>
</body>
</html>

</body>
</html>
