<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - GitHub Style</title>
  <link href="Assets/dashboard.ico" rel="icon">
  <style>
    /* Estilos Base Originales */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: #f6f8fa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 0;
      color: #24292f;
    }

    /* Contenedor Principal */
    .card {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid #d0d7de;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      width: 90%;
      max-width: 850px;
      display: none; 
      margin-bottom: 20px;
    }

    #loading { font-size: 14px; color: #57606a; }
    #error-message { font-size: 14px; color: #cf222e; display: none; background: #ffebe9; padding: 10px; border-radius: 6px; border: 1px solid rgba(207,34,46,0.2); margin-bottom: 15px; width: 90%; max-width: 850px; }

    h1 { font-size: 24px; margin-bottom: 8px; color: #1f2328; }
    h2 { font-size: 18px; margin-top: 0; margin-bottom: 16px; color: #1f2328; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
    p { color: #636e72; margin-bottom: 24px; }

    /* Estilos de Formulario de Creación */
    .form-container {
      background: #fafafa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .form-group-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .form-group {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: #24292f;
    }
    .form-group input {
      padding: 5px 12px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #d0d7de;
      background: white;
    }
    .form-group input:focus {
      border-color: #0969da;
      outline: none;
      box-shadow: 0 0 0 3px rgba(9,105,218,0.3);
    }

    /* Estilos de la Tabla */
    .table-container { overflow-x: auto; margin-bottom: 20px; }
    .user-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    .user-table th { background-color: #f6f8fa; padding: 12px; border: 1px solid #d0d7de; color: #57606a; font-weight: 600; }
    .user-table td { padding: 12px; border: 1px solid #d0d7de; vertical-align: middle; }
    .user-table tr:hover { background-color: #fcfcfc; }

    /* Avatar en la tabla */
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .avatar-mini { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #d0d7de; }

    /* Etiquetas de Estado */
    .status-badge { padding: 3px 10px; border-radius: 2em; font-size: 12px; font-weight: 500; border: 1px solid transparent; }
    .status-active { background: #dafbe1; color: #1a7f37; border-color: rgba(26, 127, 55, 0.2); }

    /* Botones */
    .btn { display: inline-block; padding: 6px 16px; background-color: #0984e3; color: white; text-decoration: none; font-weight: 600; font-size: 14px; border-radius: 6px; cursor: pointer; border: none; }
    .btn:hover { background-color: #076bba; }
    .btn-create { background-color: #1a7f37; align-self: flex-end; height: 32px; padding: 0 16px; }
    .btn-create:hover { background-color: #116329; }
    .btn-delete { background-color: #f6f8fa; color: #cf222e; border: 1px solid #d0d7de; padding: 4px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; }
    .btn-delete:hover { background-color: #cf222e; color: white; }
    .btn-logout { background-color: #f6f8fa; color: #cf222e; border: 1px solid #d0d7de; margin-left: 10px; }
    .btn-logout:hover { background-color: #cf222e; color: white; }

    .username { color: #0969da; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <div id="loading">Iniciando panel seguro y conectando con Vercel...</div>
  <div id="error-message"></div>

  <div class="card" id="dashboard-card">
    <h1>💻 Panel de Control (Vercel Backend)</h1>
    <p>Sesión activa administrando usuarios reales de Auth0</p>

    <!-- FORMULARIO PARA CREAR NUEVO USUARIO -->
    <div class="form-container">
      <h2>➕ Crear Nuevo Usuario</h2>
      <form id="create-user-form" onsubmit="createUser(event)">
        <div class="form-group-row">
          <div class="form-group">
            <label for="user-name">Nombre (Opcional)</label>
            <input type="text" id="user-name" placeholder="Ej. Juan Pérez">
          </div>
          <div class="form-group">
            <label for="user-email">Correo Electrónico</label>
            <input type="email" id="user-email" placeholder="nombre@correo.com" required>
          </div>
          <div class="form-group">
            <label for="user-password">Contraseña</label>
            <input type="password" id="user-password" placeholder="Mínimo 8 caracteres" required>
          </div>
          <button type="submit" class="btn btn-create">Crear</button>
        </div>
      </form>
    </div>

    <!-- TABLA DE USUARIOS -->
    <div class="table-container">
      <table class="user-table">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Identificador Auth0</th>
            <th>Estado</th>
            <th>Última conexión</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="users-table-body">
          <!-- Las filas se inyectan dinámicamente aquí -->
        </tbody>
      </table>
    </div>

    <div class="buttons">
      <button onclick="loadDashboardUsers()" class="btn">Refrescar Lista</button>
      <button onclick="logout()" class="btn btn-logout">Cerrar sesión</button>
    </div>
  </div>

  <script>
    // IMPORTANTE: Reemplaza esta URL con la dirección real de tu API en Vercel
    const VERCEL_API_URL = 'https://mi-dashboard-next.vercel.app'; 

    // 1. CARGAR LISTA (GET)
    async function loadDashboardUsers() {
      const loadingDiv = document.getElementById('loading');
      const cardDiv = document.getElementById('dashboard-card');
      const errorDiv = document.getElementById('error-message');
      const tbody = document.getElementById('users-table-body');

      try {
        errorDiv.style.display = 'none';
        const response = await fetch(`${VERCEL_API_URL}/api/users`); // Ajusta la ruta si tu endpoint cambia
        
        if (!response.ok) {
          throw new Error(`Error en el servidor de Vercel: ${response.status}`);
        }

        const users = await response.json();

        if (!Array.isArray(users)) {
          throw new Error("El backend no devolvió una lista válida de usuarios.");
        }

        tbody.innerHTML = '';

        users.forEach(user => {
          const userAvatar = user.picture || 'https://unsplash.com';
          const lastLoginDate = user.last_login ? new Date(user.last_login).toLocaleDateString() : 'N/A';

          const row = `
            <tr>
              <td>
                <div class="user-cell">
                  <img src="${userAvatar}" class="avatar-mini" alt="Avatar">
                  <a href="#" class="username">${user.email || user.name || 'Usuario sin email'}</a>
                </div>
              </td>
              <td style="color: #57606a; font-family: monospace; font-size: 12px;">${user.user_id}</td>
              <td><span class="status-badge status-active">Activo</span></td>
              <td>${lastLoginDate}</td>
              <td>
                <button onclick="deleteUser('${user.user_id}')" class="btn btn-delete">Eliminar</button>
              </td>
            </tr>
          `;
          tbody.innerHTML += row;
        });

        loadingDiv.style.display = 'none';
        cardDiv.style.display = 'block';

      } catch (error) {
        loadingDiv.style.display = 'none';
        errorDiv.textContent = `Error al cargar usuarios: ${error.message}`;
        errorDiv.style.display = 'block';
        cardDiv.style.display = 'block'; // Muestra el contenedor para ver el formulario y botones
      }
    }

    // 2. CREAR NUEVO USUARIO (POST)
    async function createUser(event) {
      event.preventDefault();
      const name = document.getElementById('user-name').value;
      const email = document.getElementById('user-email').value;
      const password = document.getElementById('user-password').value;
      const errorDiv = document.getElementById('error-message');

      try {
        errorDiv.style.display = 'none';
        
        // Corrección definitiva usando concatenación tradicional para evitar fallos de comillas
        const response = await fetch(VERCEL_API_URL + "/api/users", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, email, password }) });

        const data = await response.json();

        if (!response.ok) {
          // Captura el objeto de error estructurado tal como lo devuelve Next.js
          throw new Error(data.error || 'Error del servidor: ' + response.status);
        }

        document.getElementById('create-user-form').reset();
        alert('Usuario creado con éxito en Auth0');
        loadDashboardUsers(); // Actualiza la tabla automáticamente

      } catch (error) {
        errorDiv.textContent = 'Error al crear usuario: ' + error.message;
        errorDiv.style.display = 'block';
      }
    }

    // 3. ELIMINAR USUARIO (DELETE)
    async function deleteUser(userId) {
      if (!confirm('¿Estás seguro de que deseas eliminar este usuario de Auth0?')) return;
      const errorDiv = document.getElementById('error-message');

      try {
        const response = await fetch(`${VERCEL_API_URL}/api/users?id=${userId}`, {
          method: 'DELETE'
        });

        if (!response.ok) {
          throw new Error(`No se pudo eliminar el usuario: ${response.status}`);
        }

        alert('Usuario eliminado correctamente');
        loadDashboardUsers(); // Recarga la tabla

      } catch (error) {
        errorDiv.textContent = `Error al eliminar usuario: ${error.message}`;
        errorDiv.style.display = 'block';
      }
    }

        // 4. CERRAR SESIÓN
    function logout() {
      alert('Sesión cerrada.');
    }

    // Inicializar la carga al entrar a la página
    window.onload = loadDashboardUsers;
  </script>
</body>
</html>
