<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - GitHub Style</title>
  <link href="Assets/dashboard.ico" rel="icon">
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
  <style>
    /* Estilos Base Originales */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background-color: #f6f8fa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 0;
      color: #24292f;
    }

    /* Contenedor Principal */
    .card {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid #d0d7de;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      width: 90%;
      max-width: 850px;
      display: none; 
      margin-bottom: 20px;
    }

    #loading { font-size: 14px; color: #57606a; }
    #error-message { font-size: 14px; color: #cf222e; display: none; background: #ffebe9; padding: 10px; border-radius: 6px; border: 1px solid rgba(207,34,46,0.2); margin-bottom: 15px; width: 90%; max-width: 850px; }

    h1 { font-size: 24px; margin-bottom: 8px; color: #1f2328; }
    h2 { font-size: 18px; margin-top: 0; margin-bottom: 16px; color: #1f2328; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
    p { color: #636e72; margin-bottom: 24px; }

    /* Estilos de Formulario de Creación */
    .form-container {
      background: #fafafa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .form-group-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .form-group {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: #24292f;
    }
    .form-group input {
      padding: 5px 12px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #d0d7de;
      background: white;
    }
    .form-group input:focus {
      border-color: #0969da;
      outline: none;
      box-shadow: 0 0 0 3px rgba(9,105,218,0.3);
    }

    /* Estilos de la Tabla */
    .table-container { overflow-x: auto; margin-bottom: 20px; }
    .user-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    .user-table th { background-color: #f6f8fa; padding: 12px; border: 1px solid #d0d7de; color: #57606a; font-weight: 600; }
    .user-table td { padding: 12px; border: 1px solid #d0d7de; vertical-align: middle; }
    .user-table tr:hover { background-color: #fcfcfc; }

    /* Avatar en la tabla */
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .avatar-mini { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #d0d7de; }

    /* Etiquetas de Estado */
    .status-badge { padding: 3px 10px; border-radius: 2em; font-size: 12px; font-weight: 500; border: 1px solid transparent; }
    .status-active { background: #dafbe1; color: #1a7f37; border-color: rgba(26, 127, 55, 0.2); }

    /* Botones */
    .btn { display: inline-block; padding: 6px 16px; background-color: #0984e3; color: white; text-decoration: none; font-weight: 600; font-size: 14px; border-radius: 6px; cursor: pointer; border: none; }
    .btn:hover { background-color: #076bba; }
    .btn-create { background-color: #1a7f37; align-self: flex-end; height: 32px; padding: 0 16px; }
    .btn-create:hover { background-color: #116329; }
    .btn-delete { background-color: #f6f8fa; color: #cf222e; border: 1px solid #d0d7de; padding: 4px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; }
    .btn-delete:hover { background-color: #cf222e; color: white; }
    .btn-logout { background-color: #f6f8fa; color: #cf222e; border: 1px solid #d0d7de; margin-left: 10px; }
    .btn-logout:hover { background-color: #cf222e; color: white; }

    .username { color: #0969da; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <div id="loading">Iniciando panel seguro y conectando con Vercel...</div>
  <div id="error-message"></div>

  <div class="card" id="dashboard-card">
    <h1>💻 Panel de Control (Vercel Backend)</h1>
    <p>Sesión activa administrando usuarios reales de Auth0</p>

    <!-- TABLA DE USUARIOS -->
    <div class="table-container">
      <table class="user-table">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Identificador Auth0</th>
            <th>Estado</th>
            <th>Última conexión</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="users-table-body">
          <!-- Las filas se inyectan dinámicamente aquí -->
        </tbody>
      </table>
    </div>

    <div class="buttons">
      <button onclick="loadDashboardUsers()" class="btn">Refrescar Lista</button>
      <button onclick="logout()" class="btn btn-logout">Cerrar sesión</button>
    </div>
  </div>
  <script src="JS/auth0-config.js"></script>
  <script>
    // IMPORTANTE: API en Vercel
const VERCEL_API_URL = 'https://mi-dashboard-next.vercel.app'; 
let auth0Client = null;

// Inicializa el SDK usando las variables globales de tu archivo auth0-config.js
async function initAuth0Dashboard() {
  try {
    // Busca esta parte en tu función initAuth0Dashboard
      auth0Client = await auth0.createAuth0Client({ 
      domain: window.AUTH0_DOMAIN,
      client_id: window.AUTH0_CLIENT_ID,
      cacheLocation: 'localstorage',
      useRefreshTokens: true
    });

    const isAuthenticated = await auth0Client.isAuthenticated();
    
    if (isAuthenticated) {
      await loadDashboardUsers();
    } else {
      alert("Por favor, inicia sesión primero.");
      window.location.href = window.AUTH0_REDIRECT_URI;
    }
  } catch (error) {
    console.error("Error inicializando Auth0:", error);
    const errorDiv = document.getElementById('error-message');
    if (errorDiv) {
      errorDiv.textContent = `Error de autenticación: ${error.message}`;
      errorDiv.style.display = 'block';
    }
  }
}
async function loadDashboardUsers() {
  const loadingDiv = document.getElementById('loading');
  const cardDiv = document.getElementById('dashboard-card');
  const errorDiv = document.getElementById('error-message');
  const tbody = document.getElementById('users-table-body');

  try {
    if (errorDiv) errorDiv.style.display = 'none';
    
    // Obtener token de forma segura usando el cliente ya inicializado
    const token = await auth0Client.getTokenSilently();

    const response = await fetch(`${VERCEL_API_URL}/api/users`, {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });

    if (response.status === 403) {
      alert("Acceso denegado: No tienes permisos de administrador.");
      window.location.href = "index.html";
      return;
    }

    if (!response.ok) throw new Error(`Error Vercel: ${response.status}`);
    const users = await response.json();
    if (!Array.isArray(users)) throw new Error("Lista inválida.");

    tbody.innerHTML = '';
    users.forEach(user => {
      const userAvatar = user.picture || 'https://github.io';
      const lastLoginDate = user.last_login ? new Date(user.last_login).toLocaleDateString() : 'N/A';

      tbody.innerHTML += `
        <tr>
          <td>
            <div class="user-cell">
              <img src="${userAvatar}" class="avatar-mini" alt="Avatar">
              <a href="#" class="username">${user.email || user.name || 'Sin email'}</a>
            </div>
          </td>
          <td style="color: #57606a; font-family: monospace; font-size: 12px;">${user.user_id}</td>
          <td><span class="status-badge status-active">Activo</span></td>
          <td>${lastLoginDate}</td>
          <td>
            <button onclick="deleteUser('${user.user_id}')" class="btn btn-delete">Eliminar</button>
          </td>
        </tr>`;
    });

    if (loadingDiv) loadingDiv.style.display = 'none';
    if (cardDiv) cardDiv.style.display = 'block';

  } catch (error) {
    if (loadingDiv) loadingDiv.style.display = 'none';
    if (errorDiv) {
      errorDiv.textContent = `Error al cargar: ${error.message}`;
      errorDiv.style.display = 'block';
    }
    if (cardDiv) cardDiv.style.display = 'block';
  }
}
    // 2. ELIMINAR USUARIO (DELETE)
    async function deleteUser(userId) {
      if (!confirm('¿Estás seguro de que deseas eliminar este usuario de Auth0?')) return;
      const errorDiv = document.getElementById('error-message');

      try {
        // Obtener el token de forma segura
        const token = await auth0Client.getTokenSilently();

        const response = await fetch(`${VERCEL_API_URL}/api/users?id=${userId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.status === 403) {
          alert("No posees los permisos de administrador necesarios para eliminar.");
          return;
        }

        if (!response.ok) {
          throw new Error(`No se pudo eliminar el usuario: ${response.status}`);
        }

        alert('Usuario eliminado correctamente');
        await loadDashboardUsers(); // Recarga la tabla

      } catch (error) {
        errorDiv.textContent = `Error al eliminar usuario: ${error.message}`;
        errorDiv.style.display = 'block';
      }
    }

    // 3. CERRAR SESIÓN
    function logout() {
      if (auth0Client) {
        auth0Client.logout({
          logoutParams: {
            returnTo: window.AUTH0_LOGOUT_REDIRECT_URI
          }
        });
      } else {
        alert('Sesión cerrada.');
      }
    }

    // Inicializar la autenticación segura al entrar a la página
    window.onload = initAuth0Dashboard;
</script>
</body>
</html>
